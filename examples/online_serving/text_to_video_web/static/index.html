<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wan2.2 Video</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <form id="video-form" class="control-panel">
          <div class="panel-heading">
            <div>
              <h1>Wan2.2 Video</h1>
              <p id="health-status">Checking server...</p>
            </div>
            <button id="generate-button" type="submit">Generate</button>
          </div>

          <label class="field wide">
            <span>Prompt</span>
            <textarea id="prompt" name="prompt" rows="4" required>Two anthropomorphic cats in comfy boxing gear and bright gloves fight intensely on a spotlighted stage.</textarea>
          </label>

          <div class="grid">
            <label class="field">
              <span>Size</span>
              <input name="size" value="720x1280" pattern="[0-9]+x[0-9]+" />
            </label>
            <label class="field">
              <span>FPS</span>
              <input name="fps" type="number" min="1" step="1" value="12" />
            </label>
            <label class="field">
              <span>Frames</span>
              <input name="num_frames" type="number" min="1" step="1" value="61" />
            </label>
            <label class="field">
              <span>Steps</span>
              <input name="num_inference_steps" type="number" min="1" step="1" value="40" />
            </label>
            <label class="field">
              <span>Guidance</span>
              <input name="guidance_scale" type="number" min="0" step="0.1" value="1.0" />
            </label>
            <label class="field">
              <span>Flow Shift</span>
              <input name="flow_shift" type="number" step="0.1" value="5.0" />
            </label>
            <label class="field">
              <span>Seed</span>
              <input name="seed" type="number" step="1" value="42" />
            </label>
          </div>

          <label class="field wide">
            <span>Negative Prompt</span>
            <textarea name="negative_prompt" rows="2" placeholder="Optional"></textarea>
          </label>

          <fieldset class="advanced">
            <legend>Frame Interpolation</legend>
            <label class="toggle">
              <input name="enable_frame_interpolation" type="checkbox" checked />
              <span>Enable</span>
            </label>
            <div class="grid">
              <label class="field">
                <span>Model Path</span>
                <input name="frame_interpolation_model_path" value="/home/zf/vllm-omni/elfgum" />
              </label>
              <label class="field">
                <span>Exp</span>
                <input name="frame_interpolation_exp" type="number" min="1" step="1" value="1" />
              </label>
              <label class="field">
                <span>Scale</span>
                <input name="frame_interpolation_scale" type="number" min="0.1" step="0.1" value="1.0" />
              </label>
            </div>
          </fieldset>
        </form>

        <section class="result-panel">
          <div class="status-row">
            <div>
              <span class="label">Status</span>
              <strong id="job-status">idle</strong>
            </div>
            <div>
              <span class="label">Job ID</span>
              <strong id="job-id">-</strong>
            </div>
            <div>
              <span class="label">Elapsed</span>
              <strong id="elapsed">0s</strong>
            </div>
          </div>
          <progress id="progress" value="0" max="100"></progress>
          <video id="video-player" controls playsinline></video>
          <pre id="message"></pre>
        </section>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
